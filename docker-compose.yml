services:
  backend:
    build: .
    env_file:
      - backend/.env          # loads OPENROUTER_API_KEY from your .env file
    ports:
      - "8000:8000"
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend